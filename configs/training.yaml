# ============================================================================
# Chigma — Training Configuration
# FD-YOLO11 Steel Surface Defect Detection
# ============================================================================

# ── Model Architecture ──
model:
  name: "fd-yolo11"
  base: "yolo11m"                # Base model: yolo11n/s/m/l/x
  pretrained: true               # Use COCO pretrained weights
  num_classes: 6                 # NEU-DET classes
  custom_modules:
    sc_c3k2: true                # Self-Calibrated C3k2
    fsppf: true                  # Feature-fusion SPPF
    dysample: true               # DySample upsampling

# ── Training Hyperparameters ──
training:
  epochs: 150
  batch_size: 16
  imgsz: 640
  optimizer: "AdamW"
  lr0: 0.001                     # Initial learning rate
  lrf: 0.01                      # Final learning rate (lr0 * lrf)
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3.0
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1
  cos_lr: true                   # Cosine learning rate scheduler
  label_smoothing: 0.0
  patience: 50                   # EarlyStopping patience
  seed: 42

# ── Loss Weights ──
loss:
  box: 7.5                       # Box loss weight
  cls: 0.5                       # Classification loss weight
  dfl: 1.5                       # Distribution focal loss weight

# ── Validation ──
validation:
  val_interval: 5                # Validate every N epochs
  iou_threshold: 0.5             # IoU threshold for mAP
  conf_threshold: 0.25           # Confidence threshold
  max_det: 300                   # Maximum detections per image

# ── Export ──
export:
  formats:
    - "onnx"                     # Cross-platform inference
    - "engine"                   # TensorRT for edge deployment
  opset: 17                      # ONNX opset version
  simplify: true                 # ONNX simplification
  half: true                     # FP16 quantization
  dynamic: false                 # Dynamic input shapes

# ── MLflow Tracking ──
mlflow:
  experiment_name: "fd-yolo11-defect"
  tracking_uri: "http://localhost:5000"
  log_artifacts: true
  log_models: true
  tags:
    project: "chigma"
    model: "fd-yolo11"
    dataset: "neu-det"
