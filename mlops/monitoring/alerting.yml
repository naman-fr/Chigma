groups:
  - name: chigma_alerts
    rules:
      - alert: HighInferenceLatency
        expr: histogram_quantile(0.95, rate(chigma_request_latency_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High inference latency on {{ $labels.endpoint }}"
          description: "95th percentile latency is above 500ms for 5 minutes."

      - alert: HighErrorRate
        expr: sum(rate(chigma_requests_total{status=~"5.."}[5m])) / sum(rate(chigma_requests_total[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "More than 5% of requests are failing."

      - alert: APIInstanceDown
        expr: up{job="chigma-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Chigma API instance is down"
          description: "The API instance {{ $labels.instance }} has been unreachable for 1 minute."
