apiVersion: apps/v1
kind: Deployment
metadata:
  name: chigma-api
  namespace: chigma
  labels:
    app: chigma-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chigma-api
  template:
    metadata:
      labels:
        app: chigma-api
    spec:
      containers:
        - name: chigma-api
          image: ghcr.io/chigma/chigma:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "2000m"
              memory: "8Gi"
              nvidia.com/gpu: "1"
          env:
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow-service:5000"
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chigma-api-hpa
  namespace: chigma
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chigma-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
