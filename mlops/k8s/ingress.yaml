apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chigma-ingress
  namespace: chigma
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: api.chigma.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chigma-api-service
                port:
                  number: 8000
